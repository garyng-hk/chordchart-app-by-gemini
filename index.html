<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YLGC 樂譜搜尋系統</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YLGC 樂譜">
</head>
<body>
    <div class="container">
        <h1>YLGC 樂譜搜尋系統</h1>
        
        <div class="search-box">
            <input type="text" id="songName" placeholder="歌名 (例如: 奇異恩典)">
            <input type="text" id="songKey" placeholder="KEY / 調性 (例如: C)">
            <input type="text" id="lyrics" placeholder="歌詞片段 (搜尋檔案內文)">
            <button onclick="searchScores()">搜尋樂譜</button>
        </div>

        <div id="loading" class="hidden">搜尋中，請稍候...</div>
        <div id="results"></div>
    </div>

    <div id="previewModal" class="modal hidden">
        <div class="modal-content">
            <button class="close-btn" onclick="closePreview()">關閉</button>
            <iframe id="previewFrame" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // 註冊 Service Worker 讓網頁可以安裝成 App
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
